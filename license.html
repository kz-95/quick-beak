<style>
  :root{
    --paper:#eef4ec; --paper-2:#e7f0e7; --card:#ffffff; --ink:#1c2620;
    --ink-soft:#5d6b60; --accent:#2f8f57; --line:#d8e4d8;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --round:'Comfortaa',system-ui,sans-serif;
    --serif:'Literata',Georgia,serif;
  }
  *{box-sizing:border-box;border-radius:0 !important}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--mono);line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  nav{display:flex;align-items:center;justify-content:space-between;background:var(--paper-2);border-bottom:1px solid var(--line);padding:14px 24px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:28px;height:28px;display:block}
  .brand span{font-family:var(--round);font-weight:700;font-size:20px;color:var(--ink)}
  nav .home{font-size:13px;color:var(--ink-soft)}
  main{max-width:760px;margin:0 auto;padding:40px 24px 64px}
  h1.page{font-family:var(--serif);font-weight:700;font-size:34px;margin:0 0 6px}
  .src{font-size:13px;color:var(--ink-soft);margin:0 0 28px}
  .doc{background:var(--card);border:1px solid var(--line);padding:28px 28px}
  .doc h1{font-family:var(--serif);font-weight:700;font-size:24px;margin:0 0 14px}
  .doc h2{font-family:var(--serif);font-weight:600;font-size:18px;margin:22px 0 8px}
  .doc p{margin:0 0 12px}
  .doc ul{margin:0 0 14px;padding-left:22px}
  .doc li{margin:4px 0}
  .doc hr{border:0;border-top:1px solid var(--line);margin:20px 0}
  .doc strong{font-weight:700}
  footer{border-top:1px solid var(--line);text-align:center;padding:22px;font-size:12px;color:var(--ink-soft)}
  @media(max-width:640px){h1.page{font-size:28px}.doc{padding:18px}}

<body>
<nav>
  <a class="brand" href="index.html" aria-label="QuickBeak home">
    <img src="assets/QuickBeakLogoOnly.png" alt="QuickBeak logo" />

  </a>
  <a class="home" href="index.html">&lsaquo; Home</a>
</nav>
<main>
  <h1 class="page">License</h1>
  <p class="src">Source-available, no-redistribution. Loaded live from the
    <a href="https://github.com/kz-95/quick-beak/blob/main/LICENSE.md">repository LICENSE</a>.</p>
  <div class="doc" id="doc">Loading the license…</div>
</main>
<footer>&copy; <span id="yr">2026</span> QuickBeak. Built for developers.</footer>

<script>
  (function(){
    "use strict";
    var RAW = "https://raw.githubusercontent.com/kz-95/quick-beak/main/LICENSE.md";
    var BLOB = "https://github.com/kz-95/quick-beak/blob/main/LICENSE.md";
    document.getElementById("yr").textContent = new Date().getFullYear();
    function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function inline(s){
      s = esc(s);
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
      return s;
    }
    /* tiny, safe markdown -> HTML for headings, lists, hr, paragraphs (escapes first) */
    function render(md){
      var lines = md.replace(/\r/g,"").split("\n");
      var out = [], list = false;
      function closeList(){ if(list){ out.push("</ul>"); list=false; } }
      for (var i=0;i<lines.length;i++){
        var ln = lines[i];
        if (/^\s*$/.test(ln)){ closeList(); continue; }
        if (/^---+\s*$/.test(ln)){ closeList(); out.push("<hr>"); continue; }
        var h = ln.match(/^(#{1,3})\s+(.*)$/);
        if (h){ closeList(); var lvl=h[1].length; out.push("<h"+lvl+">"+inline(h[2])+"</h"+lvl+">"); continue; }
        var li = ln.match(/^\s*[-*]\s+(.*)$/);
        if (li){ if(!list){ out.push("<ul>"); list=true; } out.push("<li>"+inline(li[1])+"</li>"); continue; }
        var bq = ln.match(/^>\s?(.*)$/);
        if (bq){ closeList(); out.push("<p style='color:var(--ink-soft)'>"+inline(bq[1])+"</p>"); continue; }
        closeList(); out.push("<p>"+inline(ln)+"</p>");
      }
      closeList();
      return out.join("");
    }
    fetch(RAW, {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
      .then(function(md){ document.getElementById("doc").innerHTML = render(md); })
      .catch(function(){
        document.getElementById("doc").innerHTML =
          "<p>Couldn't load the license right now. Read it on " +
          "<a href='"+BLOB+"'>GitHub</a>.</p>";
      });
  })();
</script>
</body>
